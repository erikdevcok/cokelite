<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COK ELITE - Domine como um rei</title>

  <!-- Ícones oficiais -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 50% 50%, #1a1a1a, #0a0a0a);
      color: #d4af37;
      font-family: 'Cinzel', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Efeito de partículas douradas */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><circle cx="10" cy="10" r="1" fill="%23d4af37"/><circle cx="90" cy="30" r="1.5" fill="%23d4af37"/><circle cx="30" cy="80" r="1" fill="%23d4af37"/><circle cx="70" cy="20" r="1.2" fill="%23d4af37"/><circle cx="50" cy="60" r="1.8" fill="%23d4af37"/></svg>');
      pointer-events: none;
      animation: float 20s linear infinite;
    }

    @keyframes float {
      from { transform: translateY(0); }
      to { transform: translateY(-20px); }
    }

    header {
      position: relative;
      z-index: 1;
      animation: fadeInDown 1s ease;
    }

    header img {
      width: 140px;
      height: 140px;
      border-radius: 30px;
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
      margin-bottom: 20px;
      border: 3px solid rgba(212, 175, 55, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    header img:hover {
      transform: scale(1.05);
      box-shadow: 0 0 40px rgba(212, 175, 55, 0.8);
    }

    h1 {
      font-size: 2.8em;
      letter-spacing: 2px;
      color: #e5c46a;
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.5), 2px 2px 4px rgba(0, 0, 0, 0.5);
      margin-bottom: 10px;
      font-weight: 700;
      position: relative;
      display: inline-block;
    }

    h1::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #d4af37, transparent);
    }

    p {
      font-size: 1.2em;
      color: #bfa76b;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
      letter-spacing: 1px;
      font-weight: 500;
    }

    .buttons {
      margin-top: 50px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
      max-width: 450px;
      position: relative;
      z-index: 1;
      animation: fadeInUp 1s ease 0.3s both;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .btn {
      background: linear-gradient(135deg, #c79d35, #8a6a1f);
      color: #fff;
      text-decoration: none;
      padding: 16px 24px;
      border-radius: 50px;
      font-weight: 600;
      letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 1.1em;
      width: 100%;
      cursor: pointer;
      border: none;
      font-family: 'Cinzel', serif;
      min-height: 60px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(212, 175, 55, 0.5);
    }

    .btn:active {
      transform: translateY(-1px);
    }

    .btn i {
      font-size: 1.4em;
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.3));
    }

    /* Botão WhatsApp personalizado */
    .btn.whatsapp {
      background: linear-gradient(135deg, #25D366, #128C7E);
    }

    .btn.whatsapp:hover {
      box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4);
    }

    /* Botão YouTube personalizado */
    .btn.youtube {
      background: linear-gradient(135deg, #FF0000, #CC0000);
    }

    .btn.youtube:hover {
      box-shadow: 0 8px 25px rgba(255, 0, 0, 0.4);
    }

    /* Container para os botões de download */
    .download-container {
      width: 100%;
      position: relative;
    }

    /* Menu de download */
    .download-menu {
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
      width: 100%;
      animation: slideDown 0.3s ease;
      transform-origin: top;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: scaleY(0);
      }
      to {
        opacity: 1;
        transform: scaleY(1);
      }
    }

    .download-menu.active {
      display: flex;
    }

    .download-option {
      background: linear-gradient(135deg, #1f1f1f, #2d2d2d);
      color: #d4af37;
      text-decoration: none;
      padding: 14px 20px;
      border-radius: 40px;
      font-weight: 500;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 0.95em;
      border: 1px solid #3d3d3d;
      min-height: 50px;
      position: relative;
      overflow: hidden;
    }

    .download-option::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.1), transparent);
      transition: left 0.5s ease;
    }

    .download-option:hover::before {
      left: 100%;
    }

    .download-option:hover {
      background: linear-gradient(135deg, #2a2a2a, #3a3a3a);
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
      border-color: #d4af37;
    }

    .download-option i {
      font-size: 1.2em;
    }

    /* Indicador de download */
    .download-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(212, 175, 55, 0.2);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 0.8em;
      margin-left: 8px;
      border: 1px solid rgba(212, 175, 55, 0.3);
    }

    footer {
      margin-top: 70px;
      font-size: 0.9em;
      color: #777;
      position: relative;
      z-index: 1;
      animation: fadeIn 1s ease 0.6s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    footer p {
      font-size: 0.9em;
      color: #777;
      margin: 0;
    }

    footer span {
      color: #d4af37;
      font-weight: 600;
    }

    /* Estilo para notificações */
    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
      color: #d4af37;
      padding: 12px 24px;
      border-radius: 50px;
      border-left: 4px solid #d4af37;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      z-index: 9999;
      transform: translateX(120%);
      transition: transform 0.3s ease;
      font-size: 0.95em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .notification.show {
      transform: translateX(0);
    }

    .notification i {
      color: #4caf50;
      font-size: 1.2em;
    }

    /* Responsividade */
    @media (min-width: 768px) {
      .buttons {
        flex-direction: row;
        flex-wrap: wrap;
        max-width: 700px;
        justify-content: center;
      }
      
      .btn, .download-container {
        width: calc(50% - 10px);
        min-width: 280px;
      }
      
      .download-container {
        width: calc(50% - 10px);
      }
      
      h1 { font-size: 3.2em; }
    }

    @media (max-width: 600px) {
      h1 { font-size: 2.2em; }
      .btn { 
        padding: 14px 20px;
        font-size: 1em;
        min-height: 56px;
      }
      header img {
        width: 120px;
        height: 120px;
      }
    }

    /* Tooltip personalizado */
    [data-tooltip] {
      position: relative;
      cursor: help;
    }

    [data-tooltip]:before {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: #d4af37;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.8em;
      white-space: nowrap;
      border: 1px solid #d4af37;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 100;
    }

    [data-tooltip]:hover:before {
      opacity: 1;
      visibility: visible;
      bottom: calc(100% + 10px);
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="Ícone do COK ELITE" onerror="this.src='https://via.placeholder.com/140?text=COK'">
    <h1>COK ELITE</h1>
    <p>⚔️ Domine como um rei ⚔️</p>
  </header>

  <div class="buttons">
    <!-- Botão Android com menu de download -->
    <div class="download-container">
      <button class="btn" id="android-btn" data-tooltip="Clique para ver opções de download">
        <i class="fab fa-android"></i> Download APK
        <span class="download-count" id="android-count">2 opções</span>
      </button>
      <div class="download-menu" id="android-menu">
        <a href="https://mega.nz/file/DJ0AVazB#197OcfeDXaJrpqHlGvSjuAf4N2Zfwyj3lpxt_tW7L3o" class="download-option" target="_blank" onclick="trackDownload('android', 'mega')">
          <i class="fas fa-cloud-download-alt"></i> Mega
          <span class="download-count">1.2 GB</span>
        </a>
        <a href="https://drive.google.com/uc?export=download&id=1zJDRUrf53J8PJxTwT-fpv9wNqEqRqRzl" class="download-option" target="_blank" onclick="trackDownload('android', 'drive')">
          <i class="fab fa-google-drive"></i> Google Drive
          <span class="download-count">1.2 GB</span>
        </a>
      </div>
    </div>
    
    <!-- Botão iOS com menu de download -->
    <div class="download-container">
      <button class="btn" id="ios-btn" data-tooltip="Clique para ver opções de download">
        <i class="fab fa-apple"></i> Download IPA
        <span class="download-count" id="ios-count">2 opções</span>
      </button>
      <div class="download-menu" id="ios-menu">
        <a href="https://mega.nz/file/3d9ESIxY#NAcrKPang5zlLPmB48YCxyo2tQJ3BTBSe_8OE9R-13Q" class="download-option" target="_blank" onclick="trackDownload('ios', 'mega')">
          <i class="fas fa-cloud-download-alt"></i> Mega
          <span class="download-count">1.1 GB</span>
        </a>
        <a href="https://drive.usercontent.google.com/download?id=1oj4C4Pa8pva2YO8I-OxYZWPU90LqJSm4" class="download-option" target="_blank" onclick="trackDownload('ios', 'drive')">
          <i class="fab fa-google-drive"></i> Google Drive
          <span class="download-count">1.1 GB</span>
        </a>
      </div>
    </div>
    
    <!-- Outros botões -->
    <a href="https://chat.whatsapp.com/F9D5CHuxn58IzPWTuB73mc?mode=wwc" target="_blank" class="btn whatsapp" onclick="trackClick('whatsapp-info')">
      <i class="fab fa-whatsapp"></i> WhatsApp Info
    </a>
    <a href="https://chat.whatsapp.com/K03VpSsYnFHIToBkZVJtg6?mode=hqrt3" target="_blank" class="btn whatsapp" onclick="trackClick('whatsapp-chat')">
      <i class="fab fa-whatsapp"></i> WhatsApp Chat
    </a>
    <a href="https://www.youtube.com/@cokeliteofc" target="_blank" class="btn youtube" onclick="trackClick('youtube')">
      <i class="fab fa-youtube"></i> YouTube
    </a>
  </div>

  <!-- Notificação de confirmação -->
  <div class="notification" id="notification">
    <i class="fas fa-check-circle"></i>
    <span id="notification-message">Download iniciado!</span>
  </div>

  <footer>
    <p><span>© 2026</span> COK ELITE - Todos os direitos reservados</p>
    <p style="font-size: 0.8em; margin-top: 5px;">Versão 2.0.1 | Atualizado em Março/2026</p>
  </footer>

  <script>
    // Função para alternar o menu de download
    function toggleDownloadMenu(buttonId, menuId) {
      const button = document.getElementById(buttonId);
      const menu = document.getElementById(menuId);
      
      if (!button || !menu) return;
      
      button.addEventListener('click', function(event) {
        event.stopPropagation();
        
        // Fecha outros menus abertos
        document.querySelectorAll('.download-menu').forEach(m => {
          if (m.id !== menuId) {
            m.classList.remove('active');
          }
        });
        
        // Alterna o menu atual
        menu.classList.toggle('active');
        
        // Feedback visual no botão
        this.style.transform = 'scale(0.98)';
        setTimeout(() => {
          this.style.transform = '';
        }, 200);
      });
    }
    
    // Função para rastrear downloads
    function trackDownload(platform, source) {
      showNotification(`Download ${platform} iniciado via ${source}`);
      
      // Aqui você pode adicionar analytics
      console.log(`Download: ${platform} - ${source} - ${new Date().toISOString()}`);
      
      // Exemplo: salvar no localStorage
      const downloads = JSON.parse(localStorage.getItem('cok_downloads') || '[]');
      downloads.push({
        platform,
        source,
        timestamp: new Date().toISOString()
      });
      localStorage.setItem('cok_downloads', JSON.stringify(downloads));
    }
    
    // Função para rastrear cliques
    function trackClick(button) {
      showNotification(`Redirecionando...`);
      console.log(`Click: ${button} - ${new Date().toISOString()}`);
    }
    
    // Função para mostrar notificação
    function showNotification(message) {
      const notification = document.getElementById('notification');
      const messageSpan = document.getElementById('notification-message');
      
      messageSpan.textContent = message;
      notification.classList.add('show');
      
      setTimeout(() => {
        notification.classList.remove('show');
      }, 3000);
    }
    
    // Inicializar os menus de download
    toggleDownloadMenu('android-btn', 'android-menu');
    toggleDownloadMenu('ios-btn', 'ios-menu');
    
    // Fechar menu ao clicar fora
    document.addEventListener('click', function(event) {
      if (!event.target.closest('.download-container')) {
        document.querySelectorAll('.download-menu').forEach(menu => {
          menu.classList.remove('active');
        });
      }
    });
    
    // Prevenir que cliques nos links fechem o menu antes do redirecionamento
    document.querySelectorAll('.download-option').forEach(link => {
      link.addEventListener('click', function(event) {
        event.stopPropagation();
        // O redirecionamento acontece normalmente
      });
    });
    
    // Adicionar contador de visualizações (simulado)
    function updateViewCount() {
      const views = localStorage.getItem('cok_views') || 0;
      localStorage.setItem('cok_views', parseInt(views) + 1);
      
      // Mostrar contador no console (opcional)
      console.log(`Total de visitas: ${parseInt(views) + 1}`);
    }
    
    // Atualizar contador de visitas
    updateViewCount();
    
    // Verificar se os links são válidos
    document.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', function(e) {
        const href = this.getAttribute('href');
        if (!href || href === '#' || href === '') {
          e.preventDefault();
          showNotification('Link indisponível no momento');
        }
      });
    });
    
    // Animar números (opcional)
    function animateNumbers() {
      const counts = document.querySelectorAll('.download-count');
      counts.forEach(count => {
        count.style.transition = 'all 0.3s ease';
        count.addEventListener('mouseover', () => {
          count.style.transform = 'scale(1.1)';
        });
        count.addEventListener('mouseout', () => {
          count.style.transform = 'scale(1)';
        });
      });
    }
    
    animateNumbers();

    // Smooth scroll para links internos
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({
            behavior: 'smooth',
            block: 'start'
          });
        }
      });
    });
  </script>
</body>
</html>
